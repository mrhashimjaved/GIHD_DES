<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Entry — DataEntryPro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
    --accent:#4f8ef7; --accent2:#7c4dff; --success:#00c896;
    --warning:#ffb347; --danger:#ff4d6d;
    --text:#e8ecf4; --text2:#8892b0; --text3:#4a5568;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.04)1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  /* APP */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .topbar-left{display:flex;align-items:center;gap:16px;}
  .topbar-brand{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);}
  .badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;}
  .badge-stream1{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3);}
  .badge-stream2{background:rgba(124,77,255,.15);color:#b094ff;border:1px solid rgba(124,77,255,.3);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .deo-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 14px 5px 8px;font-size:13px;}
  .deo-avatar{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
  .btn-logout{background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .2s;}
  .btn-logout:hover{border-color:var(--danger);color:var(--danger);}
  .form-container{max-width:920px;margin:0 auto;padding:32px 24px 90px;}
  .form-header{margin-bottom:28px;}
  .form-title{font-size:20px;font-weight:600;margin-bottom:4px;}
  .form-sub{font-size:13px;color:var(--text2);}
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;}
  .section-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .section-num{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;}
  .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
  .section-body{padding:20px;}
  .fields-grid{display:grid;gap:16px;}
  .fields-grid.col2{grid-template-columns:1fr 1fr;}
  .fields-grid.col3{grid-template-columns:1fr 1fr 1fr;}
  .fields-grid.col4{grid-template-columns:1fr 1fr 1fr 1fr;}
  @media(max-width:700px){.fields-grid.col2,.fields-grid.col3,.fields-grid.col4{grid-template-columns:1fr 1fr;}}
  @media(max-width:420px){.fields-grid.col2,.fields-grid.col3,.fields-grid.col4{grid-template-columns:1fr;}}
  .field-wrap{display:flex;flex-direction:column;}
  .field-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .field-name{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:.6px;}
  .field-range{font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--surface2);padding:2px 6px;border-radius:4px;}
  .field-error{font-size:11px;color:var(--danger);margin-top:5px;display:none;font-family:var(--mono);}
  .field-error.show{display:block;}
  select,input[type="text"],input[type="number"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;}
  select{cursor:pointer;} select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15);} select option{background:var(--surface2);}
  input.error,select.error{border-color:var(--danger)!important;}
  .missing-codes{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .mc-btn{padding:3px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:var(--mono);color:var(--text3);cursor:pointer;transition:all .15s;}
  .mc-btn:hover{border-color:var(--warning);color:var(--warning);}
  .mc-btn.active{background:rgba(255,179,71,.15);border-color:var(--warning);color:var(--warning);}
  .submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(26,29,39,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
  .submit-info{font-size:12px;color:var(--text2);font-family:var(--mono);}
  .submit-info span{color:var(--accent);}
  .btn-submit{padding:11px 32px;background:linear-gradient(135deg,var(--success),#00a876);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:opacity .2s,transform .1s;font-family:var(--sans);}
  .btn-submit:hover{opacity:.9;} .btn-submit:active{transform:scale(.97);} .btn-submit:disabled{opacity:.4;cursor:not-allowed;}
  .toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
  .toast{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:slideIn .3s ease;max-width:340px;}
  .toast.success{background:var(--success);color:#fff;} .toast.error{background:var(--danger);color:#fff;} .toast.warning{background:var(--warning);color:#000;}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:420px;width:90%;text-align:center;}
  .modal-icon{font-size:40px;margin-bottom:16px;} .modal-title{font-size:18px;font-weight:600;margin-bottom:8px;}
  .modal-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:24px;}
  .modal-btns{display:flex;gap:12px;justify-content:center;}
  .btn-modal-cancel{padding:9px 20px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:13px;}
  .btn-modal-confirm{padding:9px 20px;background:var(--danger);border:none;color:#fff;border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;}
  .progress-bar{height:3px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:24px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s ease;}
  .clear-btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .2s;}
  .clear-btn:hover{border-color:var(--warning);color:var(--warning);}
</style>
</head>

<script>
let currentDEO = null;
let currentStream = null;
let submittedKeys = new Set();

// ── INIT — read session set by login.html ─────────────────────
(function init() {
  const deo    = sessionStorage.getItem('deo');
  const stream = sessionStorage.getItem('stream');
  if (!deo || !stream) {
    // Not logged in — bounce back to login
    window.location.href = 'login.html';
    return;
  }
  currentDEO    = deo;
  currentStream = parseInt(stream);

  // Update topbar
  document.getElementById('deoName').textContent   = currentDEO;
  document.getElementById('deoAvatar').textContent  = currentDEO[0].toUpperCase();
  const badge = document.getElementById('streamBadge');
  badge.textContent  = 'Stream ' + currentStream;
  badge.className    = 'badge badge-stream' + currentStream;
  document.getElementById('formTitle').textContent  = 'Data Entry — Stream ' + currentStream;
  document.getElementById('sbStream').textContent   = currentStream;
  document.getElementById('sbDeo').textContent      = currentDEO;

  buildForm();
})();

function doLogout() {
  if (!confirm('Logout? Any unsaved data will be lost.')) return;
  sessionStorage.removeItem('deo');
  sessionStorage.removeItem('stream');
  window.location.href = 'login.html';
}

// ── BUILD FORM ────────────────────────────────────────────────
function buildForm() {
  const body = document.getElementById('formBody');
  body.innerHTML = '';
  FORM_SECTIONS.forEach((section, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    const letter = String.fromCharCode(65 + si);
    card.innerHTML = `
      <div class="section-header">
        <div class="section-num">${letter}</div>
        <div class="section-title">${section.title}</div>
      </div>
      <div class="section-body">
        <div class="fields-grid col${section.columns || 2}" id="grid_${si}"></div>
      </div>`;
    body.appendChild(card);
    const grid = document.getElementById('grid_' + si);
    section.fields.forEach(f => grid.appendChild(buildField(f)));
  });
}

// ── SCHOOL_ID → SCHOOL_NAME MAP ──────────────────────────────
const SCHOOL_NAME_MAP = {};
(function buildSchoolMap() {
  const f = FORM_SECTIONS[0].fields.find(x => x.id === 'School_ID');
  if (f && f.options) f.options.forEach(o => { SCHOOL_NAME_MAP[o.v] = o.l; });
})();

function buildField(f) {
  const wrap = document.createElement('div');
  wrap.className = 'field-wrap';
  wrap.id = 'wrap_' + f.id;

  // Range badge
  let rangeHtml = '';
  if (f.type === 'number' && (f.min !== undefined || f.max !== undefined)) {
    rangeHtml = `<span class="field-range">${f.min !== undefined ? f.min : ''}–${f.max !== undefined ? f.max : ''}</span>`;
  }

  // Note badge
  let noteHtml = f.note ? `<span class="field-range" style="color:var(--text2);margin-left:4px;">${f.note}</span>` : '';

  // Input element
  let inputHtml = '';
  if (f.readonly) {
    inputHtml = `<input type="text" id="${f.id}" placeholder="Auto-filled" readonly
      style="opacity:.5;cursor:not-allowed;background:var(--bg);">`;
  } else if (f.type === 'select') {
    const opts = (f.options || []).map(o =>
      `<option value="${o.v}">${o.v} — ${o.l}</option>`).join('');
    inputHtml = `<select id="${f.id}" onchange="onFieldChange('${f.id}')">
      <option value="">— select —</option>${opts}</select>`;
  } else {
    const placeholder = f.type === 'number'
      ? (f.min !== undefined ? f.min : '') + '…' + (f.max !== undefined ? f.max : '')
      : 'Enter value';
    inputHtml = `<input type="${f.type === 'number' ? 'number' : 'text'}"
      id="${f.id}" placeholder="${placeholder}"
      oninput="onFieldChange('${f.id}')" autocomplete="off">`;
  }

  // Missing code buttons — use per-field missingCodes if defined, else all codes
  let missingHtml = '';
  if (f.allowMissing && !f.readonly) {
    const codes = f.missingCodes
      ? f.missingCodes.map(c => [String(c), MISSING_CODES[c] || c])
      : Object.entries(MISSING_CODES);
    const btns = codes.map(([code, label]) =>
      `<button class="mc-btn" title="${label}" data-field="${f.id}" data-code="${code}"
        onclick="applyMissingCode('${f.id}',${code})">${code}</button>`
    ).join('');
    missingHtml = `<div class="missing-codes">${btns}</div>`;
  }

  wrap.innerHTML = `
    <div class="field-meta">
      <span class="field-name">${f.label}</span>
      <span style="display:flex;gap:4px;align-items:center;">${rangeHtml}${noteHtml}</span>
    </div>
    ${inputHtml}
    <div class="field-error" id="err_${f.id}"></div>
    ${missingHtml}`;
  return wrap;
}

function applyMissingCode(fieldId, code) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  el.value = code;
  el.classList.remove('error');
  document.getElementById('err_' + fieldId).classList.remove('show');
  document.querySelectorAll('.mc-btn[data-field="' + fieldId + '"]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.code) === code);
  });
  updateProgress();
}

function onFieldChange(fieldId) {
  document.querySelectorAll('.mc-btn[data-field="' + fieldId + '"]').forEach(b =>
    b.classList.remove('active'));
  // Auto-fill School_Name when School_ID changes
  if (fieldId === 'School_ID') {
    const el = document.getElementById('School_ID');
    const nameEl = document.getElementById('School_Name');
    if (nameEl && el) nameEl.value = SCHOOL_NAME_MAP[el.value] || '';
  }
  validateField(fieldId);
  updateProgress();
}

// ── VALIDATION ────────────────────────────────────────────────
function findFieldConfig(id) {
  for (const s of FORM_SECTIONS)
    for (const f of s.fields) if (f.id === id) return f;
  return null;
}

function validateField(id) {
  const el = document.getElementById(id);
  const errEl = document.getElementById('err_' + id);
  const f = findFieldConfig(id);
  if (!el || !f) return true;
  if (f.readonly || !f.required) { clearError(el, errEl); return true; }
  const val = el.value.trim();
  if (val === '') { setError(el, errEl, 'Required'); return false; }
  if (f.type === 'text' || f.type === 'select') { clearError(el, errEl); return true; }
  // number
  const num = Number(val);
  const missingCodes = Object.keys(MISSING_CODES).map(Number);
  if (missingCodes.includes(num)) { clearError(el, errEl); return true; }
  if (isNaN(num)) { setError(el, errEl, 'Must be a number'); return false; }
  if (f.min !== undefined && num < f.min) { setError(el, errEl, 'Min: ' + f.min); return false; }
  if (f.max !== undefined && num > f.max) { setError(el, errEl, 'Max: ' + f.max); return false; }
  clearError(el, errEl); return true;
}

function setError(el, errEl, msg) {
  el.classList.add('error');
  errEl.textContent = '✕ ' + msg;
  errEl.classList.add('show');
}
function clearError(el, errEl) {
  el.classList.remove('error');
  errEl.classList.remove('show');
}

function validateAll() {
  let ok = true; let firstErr = null;
  FORM_SECTIONS.forEach(s => s.fields.forEach(f => {
    const valid = validateField(f.id);
    if (!valid && !firstErr) firstErr = f.id;
    if (!valid) ok = false;
  }));
  if (firstErr) document.getElementById(firstErr)?.scrollIntoView({behavior:'smooth',block:'center'});
  return ok;
}

// ── PROGRESS ──────────────────────────────────────────────────
function updateProgress() {
  let total = 0, filled = 0;
  FORM_SECTIONS.forEach(s => s.fields.forEach(f => {
    if (f.readonly || !f.required) return;
    total++;
    const el = document.getElementById(f.id);
    if (el && el.value.trim() !== '') filled++;
  }));
  const pct = total ? Math.round((filled / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '% complete';
}

// ── DUPLICATE CHECK ───────────────────────────────────────────
function buildKey() {
  return IDENTIFIER_FIELDS.map(id => {
    const el = document.getElementById(id);
    return el ? el.value.trim().toLowerCase() : '';
  }).join('|');
}

// ── SUBMIT ────────────────────────────────────────────────────
function handleSubmit() {
  if (!validateAll()) { showToast('Fix errors before submitting.', 'error'); return; }
  const key = buildKey();
  if (submittedKeys.has(key)) {
    const sc = document.getElementById('School_ID')?.value || '';
    const cn = document.getElementById('Child_Name')?.value || '';
    const fn = document.getElementById('Father_Name')?.value || '';
    const rn = document.getElementById('Child_Roll_num')?.value || '';
    const cl = document.getElementById('Class_Section')?.value || '';
    document.getElementById('dupMsg').textContent =
      `A record for School "${sc}", Class "${cl}", Roll ${rn} — Child: "${cn}" / Father: "${fn}" already exists in this session. Overwrite it?`;
    document.getElementById('dupModal').classList.add('show');
    return;
  }
  submitData(false);
}
function closeDupModal() { document.getElementById('dupModal').classList.remove('show'); }
function confirmOverwrite() { closeDupModal(); submitData(true); }

async function submitData(overwrite) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  const payload = {
    stream: currentStream,
    deo: currentDEO,
    timestamp: new Date().toISOString(),
    overwrite: overwrite,
  };
  FORM_SECTIONS.forEach(s => s.fields.forEach(f => {
    const el = document.getElementById(f.id);
    payload[f.id] = el ? el.value.trim() : '';
  }));

  try {
    await fetch(GOOGLE_SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    submittedKeys.add(buildKey());
    showToast('✓ Record submitted successfully!', 'success');
    clearForm();
  } catch(e) {
    showToast('Submission failed — check your connection.', 'error');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = 'Submit Record ↗';
}

function clearFormConfirm() {
  if (confirm('Clear all fields?')) clearForm();
}
function clearForm() {
  FORM_SECTIONS.forEach(s => s.fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) { el.value = ''; el.classList.remove('error'); }
    const errEl = document.getElementById('err_' + f.id);
    if (errEl) errEl.classList.remove('show');
    document.querySelectorAll('.mc-btn[data-field="' + f.id + '"]').forEach(b =>
      b.classList.remove('active'));
  }));
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'success');
  t.textContent = msg;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>

function doPost(e) {

    const sheetName = 'Stream' + data.stream;
    let sheet = ss.getSheetByName(sheetName);

    // Build header row if empty
    if (sheet.getLastRow() === 0) {
      const headers = ['timestamp','deo','stream'];
      // collect all field ids dynamically from first submission

      });
      sheet.appendRow(headers);
    }

    const headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];

      for (let r = 1; r < allData.length; r++) {
        const match = idFields.every(f => String(allData[r][idxMap[f]]).toLowerCase() === String(data[f]).toLowerCase());
        if (match) { sheet.deleteRow(r + 1); break; }
      }
    }

    const row = headers.map(h => data[h] !== undefined ? data[h] : '');
    sheet.appendRow(row);

    return ContentService.createTextOutput(JSON.stringify({status:'ok'}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status:'error', message: err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}
